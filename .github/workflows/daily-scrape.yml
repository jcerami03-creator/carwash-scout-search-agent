name: Daily Car Wash Email Check

on:
  schedule:
    # GitHub's free scheduler frequently drops scheduled runs, so we fire many
    # times across the 3-5 PM ET window (19:00-21:00 UTC, off-peak, odd minutes)
    # to maximize the chance at least one gets through. The site dedups by
    # listing id, so running several times a day is always harmless.
    - cron: "7 19 * * *"    # 3:07 PM ET
    - cron: "23 19 * * *"   # 3:23 PM ET
    - cron: "41 19 * * *"   # 3:41 PM ET
    - cron: "13 20 * * *"   # 4:13 PM ET
    - cron: "33 20 * * *"   # 4:33 PM ET
    - cron: "53 20 * * *"   # 4:53 PM ET
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run email scanner
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SCOUT_USER: ${{ secrets.SCOUT_USER }}
          SCOUT_PASS: ${{ secrets.SCOUT_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py
