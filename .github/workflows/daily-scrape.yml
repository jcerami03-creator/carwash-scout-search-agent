name: Daily Car Wash Email Check

on:
  schedule:
    # GitHub's scheduler is best-effort and heavily delays jobs at the top of
    # the hour, so we fire a few times just after 8 PM ET. The site dedups by
    # listing id, so running more than once is always harmless.
    - cron: "7 0 * * *"
    - cron: "22 0 * * *"
    - cron: "37 0 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run email scanner
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SCOUT_USER: ${{ secrets.SCOUT_USER }}
          SCOUT_PASS: ${{ secrets.SCOUT_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py
