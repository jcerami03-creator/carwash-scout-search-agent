name: Daily Car Wash Email Check

on:
  schedule:
    # 3 PM ET = 19:00 UTC -- well off GitHub's congested midnight-UTC window,
    # so scheduled runs fire far more reliably here. A few times for safety;
    # the site dedups by listing id, so extra runs are always harmless.
    - cron: "7 19 * * *"
    - cron: "22 19 * * *"
    - cron: "37 19 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run email scanner
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SCOUT_USER: ${{ secrets.SCOUT_USER }}
          SCOUT_PASS: ${{ secrets.SCOUT_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py
