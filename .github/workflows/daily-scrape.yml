name: Daily Car Wash Scrape

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libatk1.0-0 libatk-bridge2.0-0 libcups2 libxkbcommon0 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Install Chromium browser
        run: playwright install chromium

      - name: Run scraper
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python main.py
