name: Daily Car Wash Scrape

on:
  schedule:
    # Runs every day at 8 AM Eastern (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:
    # Allows you to run it manually from GitHub with a button click

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium browser
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python main.py
